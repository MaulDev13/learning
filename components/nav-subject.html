<div id="subject-menu"></div>

<script>
(function () {
    const subject = document
        .querySelector('meta[name="subject"]')
        ?.getAttribute("content");

    if (!subject) return;

    const container = document.getElementById("subject-menu");

    container.setAttribute("hx-get", `components/menus/${subject}.html`);
    container.setAttribute("hx-trigger", "load");
    container.setAttribute("hx-swap", "innerHTML");

    if (window.htmx) {
        htmx.process(container);
    }
})();
</script>
