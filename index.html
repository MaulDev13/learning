<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maul Dev</title>

    <link rel="icon" href="assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">

    <meta name="api-base" content="https://simple-go-production.up.railway.app">
    <link rel="stylesheet" href="css/style.css">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>

<body>
    <!-- MAIN APP WRAPPER -->
    <div class="container content-center page-stack">

        <!-- NAVBAR (DYNAMIC LEVEL SYSTEM) -->
        <div id="nav-stack" class="page-stack">
            <nav id="navbar-0" class="nav-level"></nav>
            <nav id="navbar-1" class="nav-level"></nav>
            <nav id="navbar-2" class="nav-level"></nav>
            <nav id="navbar-3" class="nav-level"></nav>
        </div>

        <!-- CONTENT AREA -->
        <main class="page-stack">

            <!-- LOADING STATE -->
            <div id="loading" class="hidden">
                <p class="text-meta">Loading...</p>
            </div>

            <!-- PAGE CONTENT -->
            <section id="content"
                hx-get="/pages/home.html"
                hx-trigger="load"
                hx-swap="innerHTML">
            </section>

        </main>

        <!-- FOOTER -->
        <footer class="footer-center">
            <p class="text-meta">
                Architecture: HTMX + Vanilla JS
            </p>
        </footer>

    </div>

    <!-- SCRIPTS -->
    <script src="js/config.js"></script>
    <script src="js/nav-tree.js"></script>
    <script src="js/nav-engine.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
