<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maul Dev</title>

    <link rel="icon" href="assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">

    <meta name="api-base" content="https://simple-go-production.up.railway.app">
    <link rel="stylesheet" href="css/style.css">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>

<body>
    <!-- MAIN APP WRAPPER -->
    <div class="container content-center page-stack">
        <!-- NAVBAR (HTMX LOADED) -->
        <nav
            hx-get="/components/navbar.html"
            hx-trigger="load"
            hx-swap="innerHTML">
        </nav>

        <!-- CONTENT AREA -->
        <main class="page-stack">

            <!-- LOADING STATE -->
            <div id="loading" class="hidden">
                <p class="text-meta">Loading...</p>
            </div>

            <!-- PAGE CONTENT -->
            <section id="content"
                hx-get="/pages/home.html"
                hx-trigger="load"
                hx-swap="innerHTML">
            </section>

        </main>

        <!-- FOOTER -->
        <footer style="text-align:center;">
            <p class="text-meta">
                Architecture: HTMX + Vanilla JS<br>
            </p>
        </footer>

    </div>

    <!-- SCRIPTS -->
    <script src="js/config.js"></script>
    <script src="js/script.js"></script>

    <script>
    /* =========================================================
    CONFIG
    ========================================================= */
    const API_BASE = document
        .querySelector('meta[name="api-base"]')
        .getAttribute("content");

    const BASE_PATH = (
        location.hostname === "localhost" ||
        location.hostname === "127.0.0.1"
    ) ? "" : "/learning/";

    /* =========================================================
    HTMX ROUTING
    ========================================================= */
    document.body.addEventListener("htmx:configRequest", function (event) {
        let path = event.detail.path;

        if (!path) return;

        // API routing
        if (path.startsWith("/api")) {
            event.detail.path = API_BASE + path;
            return;
        }

        // static routing
        if (!path.startsWith("http")) {
            event.detail.path = BASE_PATH + path;
        }
    });

    /* =========================================================
    NAV ACTIVE STATE
    ========================================================= */
    function setActive(button) {
        document.querySelectorAll(".nav-btn")
            .forEach(btn => btn.classList.remove("is-active"));

        button.classList.add("is-active");
    }

    document.body.addEventListener("click", function (e) {
        const btn = e.target.closest(".nav-btn");
        if (btn) setActive(btn);
    });

    /* =========================================================
    DROPDOWN SYSTEM (STABLE + HTMX SAFE)
    ========================================================= */
    function initDropdown() {
        const dropdowns = document.querySelectorAll('.nav-dropdown');

        dropdowns.forEach(dropdown => {
            const toggle = dropdown.querySelector('.nav-dropdown-toggle');

            if (!toggle) return;

            // prevent double binding
            if (toggle.dataset.bound === "true") return;
            toggle.dataset.bound = "true";

            toggle.addEventListener('click', (e) => {
                e.stopPropagation();

                const isOpen = dropdown.classList.contains('open');

                // close all
                document.querySelectorAll('.nav-dropdown')
                    .forEach(d => d.classList.remove('open'));

                // toggle current
                if (!isOpen) {
                    dropdown.classList.add('open');
                }
            });
        });
    }

    /* =========================================================
    CLOSE DROPDOWN ON OUTSIDE CLICK (ONLY ONCE)
    ========================================================= */
    document.addEventListener('click', () => {
        document.querySelectorAll('.nav-dropdown')
            .forEach(d => d.classList.remove('open'));
    });

    /* =========================================================
    CLOSE ON ESC KEY (UX IMPROVEMENT)
    ========================================================= */
    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") {
            document.querySelectorAll('.nav-dropdown')
                .forEach(d => d.classList.remove('open'));
        }
    });

    /* =========================================================
    LOADING STATE (HTMX)
    ========================================================= */
    const loadingEl = document.getElementById("loading");

    document.body.addEventListener("htmx:beforeRequest", () => {
        loadingEl?.classList.remove("hidden");
    });

    document.body.addEventListener("htmx:afterRequest", () => {
        loadingEl?.classList.add("hidden");
    });

    document.body.addEventListener("htmx:responseError", () => {
        loadingEl?.classList.add("hidden");
    });

    /* =========================================================
    INIT SYSTEM (SAFE FOR HTMX RELOAD)
    ========================================================= */
    function initApp() {
        initDropdown();
    }

    /* first load */
    document.addEventListener("DOMContentLoaded", initApp);

    /* re-init after HTMX swap (navbar reload safety) */
    document.body.addEventListener("htmx:afterSwap", (e) => {
        if (e.target.closest('nav')) {
            initDropdown();
        }
    });
</script>

</body>
</html>
